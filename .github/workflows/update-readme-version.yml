name: Update README on Release

on:
  release:
    types: [published]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Update, commit and push README version
        env:
          NEW_VERSION: ${{ github.event.release.tag_name }}
        run: |
          sed -i "s|refs/tags/v[^/]*|refs/tags/$NEW_VERSION|g" README.md
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update README installation version to $NEW_VERSION" || exit 0
          git push origin main
