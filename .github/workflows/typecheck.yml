name: CI / Type Check

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mypy:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install project and type checker
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run mypy
        run: mypy
